<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citrusvil | Planta A</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .clock-container {
            position: relative;
            width: 290px;
            height: 290px;
            border-radius: 50%;
        }
        @media (min-width: 640px) {
            .clock-container {
                width: 360px;
                height: 360px;
            }
        }
        .camara-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Posiciones en sentido HORARIO (Cámaras 6 a 11) */
        .pos-0 { top: 12%; left: 50%; }   /* Cámara 6 */
        .pos-1 { top: 31%; left: 83%; }   /* Cámara 7 */
        .pos-2 { top: 69%; left: 83%; }   /* Cámara 8 */
        .pos-3 { top: 88%; left: 50%; }   /* Cámara 9 */
        .pos-4 { top: 69%; left: 17%; }   /* Cámara 10 */
        .pos-5 { top: 31%; left: 17%; }   /* Cámara 11 */

        @keyframes spin-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-clockwise {
            animation: spin-clockwise 20s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="border-b border-slate-200 pb-4 mb-6">
            <div class="flex items-baseline gap-3">
                <span class="text-2xl md:text-3xl font-black text-emerald-700 tracking-wider">CITRUSVIL</span>
                <span class="text-lg md:text-xl font-bold text-slate-400 tracking-wide">| PLANTA A</span>
            </div>
            <h1 class="text-lg md:text-xl font-extrabold text-slate-900 mt-1 tracking-tight">
                Dinámica de almacenamiento en cámaras de frío
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <div class="lg:col-span-6 space-y-4">
                
                <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                    
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mb-4 pb-4 border-b border-slate-100">
                        <div class="p-1 bg-slate-100 rounded-lg border border-slate-200/60 w-full sm:w-auto flex flex-row">
                            <button id="btn-modo-real" onclick="cambiarModo('real')" class="px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer bg-white text-indigo-600 shadow-sm border border-slate-200/40 whitespace-nowrap">
                                1 Cámara (Real)
                            </button>
                            <button id="btn-modo-ideal" onclick="cambiarModo('ideal')" class="px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer text-slate-600 hover:bg-white/50 whitespace-nowrap">
                                2 Cámaras (Ideal)
                            </button>
                        </div>
                        
                        <span id="contador-dias" class="text-xs font-extrabold bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full border border-indigo-100 self-stretch sm:self-auto text-center">
                            Paso 1
                        </span>
                    </div>

                    <div class="grid grid-cols-12 gap-2 mb-4">
                        <button onclick="retrocederDia()" class="col-span-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2.5 rounded-lg transition flex items-center justify-center gap-1 cursor-pointer text-xs border border-slate-200/60">
                            ◀ Volver
                        </button>
                        <button id="btn-siguiente" onclick="avanzarDia()" class="col-span-6 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-2.5 rounded-lg transition shadow-md shadow-indigo-600/10 flex items-center justify-center gap-2 cursor-pointer text-xs md:text-sm tracking-wide">
                            Avanzar Paso ▶
                        </button>
                        <button onclick="reiniciarSimulacion()" class="col-span-3 bg-slate-50 hover:bg-slate-100 text-slate-400 font-bold py-2.5 rounded-lg transition cursor-pointer text-xs border border-slate-200/40">
                            ⟳
                        </button>
                    </div>

                    <div class="p-3.5 bg-slate-50 rounded-xl border border-slate-200/60 relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-600"></div>
                        <div class="grid grid-cols-2 gap-4 text-xs md:text-sm" id="datos-operacion">
                            </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="text-center border-r border-slate-100">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Ocupación Actual</span>
                        <span id="kpi-ocupacion" class="text-lg md:text-2xl font-black text-indigo-600">16%</span>
                    </div>
                    <div class="text-center border-r border-slate-100">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Cámaras Libres</span>
                        <span id="kpi-libres" class="text-lg md:text-2xl font-black text-slate-700">5</span>
                    </div>
                    <div class="text-center px-1">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Ciclos FIFO</span>
                        <span id="kpi-contador-despachos" class="text-lg md:text-2xl font-black text-emerald-600">0</span>
                    </div>
                </div>
                
            </div>

            <div class="lg:col-span-6 flex flex-col items-center bg-white border border-slate-200 p-4 md:p-6 rounded-xl shadow-sm">
                
                <div class="clock-container my-2 bg-slate-50 border border-slate-100 flex items-center justify-center shadow-inner">
                    
                    <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full bg-white border border-slate-200 flex flex-col items-center justify-center text-center p-2 z-10 shadow-sm">
                        <span class="text-[8px] sm:text-[9px] text-slate-400 font-bold tracking-widest">INGRESO</span>
                        <span class="text-[10px] sm:text-xs font-black text-indigo-600 tracking-wider">HORARIO</span>
                        <svg class="w-4 h-4 sm:w-5 sm:h-5 text-indigo-500 mt-1 animate-spin-clockwise" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
                        </svg>
                    </div>
                    
                    <div id="reloj-camaras" class="absolute inset-0 w-full h-full"></div>
                </div>

                <div class="w-full grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-100 text-[10px] md:text-[11px] font-semibold text-slate-500">
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-white border border-dashed border-slate-300 rounded"></div>
                        <span>Vacía (Disponible)</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-blue-500 animate-pulse rounded"></div>
                        <span>Ingreso (Llenado)</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-emerald-600 rounded"></div>
                        <span>Completa</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-amber-500 animate-pulse rounded"></div>
                        <span>Interplantas (Despacho)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const camarasConfig = [6, 7, 8, 9, 10, 11];
        let diaActual = 0;
        let modoActual = 'real';

        const cronogramaReal = [
            { paso: "Paso 1", estados: ['llenando', 'vacía', 'vacía', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 6", despacho: "Ninguno (Sin Stock)", ciclo: 0, ocupacion: "16%", libres: "5" },
            { paso: "Paso 2", estados: ['llena', 'llenando', 'vacía', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 7", despacho: "Ninguno (Acumulando)", ciclo: 0, ocupacion: "33%", libres: "4" },
            { paso: "Paso 3", estados: ['llena', 'llena', 'llenando', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 8", despacho: "Ninguno (Acumulando)", ciclo: 0, ocupacion: "50%", libres: "3" },
            { paso: "Paso 4", estados: ['llena', 'llena', 'llena', 'llenando', 'vacía', 'vacía'], ingreso: "Cámara 9", despacho: "Ninguno (Acumulando)", ciclo: 0, ocupacion: "66%", libres: "2" },
            { paso: "Paso 5", estados: ['llena', 'llena', 'llena', 'llena', 'llenando', 'vacía'], ingreso: "Cámara 10", despacho: "Ninguno (Último pulmón)", ciclo: 0, ocupacion: "83%", libres: "1" },
            { paso: "Paso 6", estados: ['vaciando', 'llena', 'llena', 'llena', 'llena', 'llenando'], ingreso: "Cámara 11", despacho: "Cámara 6", ciclo: 0, ocupacion: "83%", libres: "1" },
            { paso: "Paso 7", estados: ['llenando', 'vaciando', 'llena', 'llena', 'llena', 'llena'], ingreso: "Cámara 6", despacho: "Cámara 7", ciclo: 1, ocupacion: "83%", libres: "1" },
            { paso: "Paso 8", estados: ['llena', 'llenando', 'vaciando', 'llena', 'llena', 'llena'], ingreso: "Cámara 7", despacho: "Cámara 8", ciclo: 1, ocupacion: "83%", libres: "1" },
            { paso: "Paso 9", estados: ['llena', 'llena', 'llenando', 'vaciando', 'llena', 'llena'], ingreso: "Cámara 8", despacho: "Cámara 9", ciclo: 1, ocupacion: "83%", libres: "1" }
        ];

        const cronogramaIdeal = [
            { paso: "Paso 1", estados: ['llenando', 'vacía', 'vacía', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 6", despacho: "Ninguno (Inicio)", ciclo: 0, ocupacion: "16%", libres: "5" },
            { paso: "Paso 2", estados: ['llena', 'llenando', 'vacía', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 7", despacho: "Ninguno (Acumulando)", ciclo: 0, ocupacion: "33%", libres: "4" },
            { paso: "Paso 3", estados: ['llena', 'llena', 'llenando', 'vacía', 'vacía', 'vacía'], ingreso: "Cámara 8", despacho: "Ninguno (Acumulando)", ciclo: 0, ocupacion: "50%", libres: "3" },
            { paso: "Paso 4", estados: ['llena', 'llena', 'llena', 'llenando', 'vacía', 'vacía'], ingreso: "Cámara 9", despacho: "Ninguno (Límite de Régimen)", ciclo: 0, ocupacion: "66%", libres: "2" },
            { paso: "Paso 5", estados: ['vaciando', 'llena', 'llena', 'llena', 'llenando', 'vacía'], ingreso: "Cámara 10", despacho: "Cámara 6", ciclo: 1, ocupacion: "66%", libres: "2" },
            { paso: "Paso 6", estados: ['vacía', 'vaciando', 'llena', 'llena', 'llena', 'llenando'], ingreso: "Cámara 11", despacho: "Cámara 7", ciclo: 1, ocupacion: "66%", libres: "2" },
            { paso: "Paso 7", estados: ['llenando', 'vacía', 'vaciando', 'llena', 'llena', 'llena'], ingreso: "Cámara 6", despacho: "Cámara 8", ciclo: 1, ocupacion: "66%", libres: "2" }
        ];

        function getCronograma() {
            return modoActual === 'real' ? cronogramaReal : cronogramaIdeal;
        }

        function cambiarModo(modo) {
            modoActual = modo;
            diaActual = 0;
            
            const btnReal = document.getElementById('btn-modo-real');
            const btnIdeal = document.getElementById('btn-modo-ideal');
            
            if (modo === 'real') {
                btnReal.className = "px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer bg-white text-indigo-600 shadow-sm border border-slate-200/40 whitespace-nowrap";
                btnIdeal.className = "px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer text-slate-600 hover:bg-white/50 whitespace-nowrap";
            } else {
                btnIdeal.className = "px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer bg-white text-indigo-600 shadow-sm border border-slate-200/40 whitespace-nowrap";
                btnReal.className = "px-3 py-1.5 rounded-md text-xs font-bold transition cursor-pointer text-slate-600 hover:bg-white/50 whitespace-nowrap";
            }
            
            renderizarReloj();
        }

        function renderizarReloj() {
            const contenedor = document.getElementById('reloj-camaras');
            contenedor.innerHTML = '';

            const cronograma = getCronograma();
            const datosActuales = cronograma[diaActual];
            const estados = datosActuales.estados;

            camarasConfig.forEach((num, index) => {
                const estado = estados[index];
                
                let cardEstilos = 'bg-white border-slate-200 text-slate-400';
                let badgeEstilos = 'bg-slate-100 text-slate-400';
                let textoEstado = 'VACÍA';
                let shadowGlow = 'shadow-sm';

                if (estado === 'llenando') {
                    cardEstilos = 'bg-blue-50 border-blue-400 text-blue-900 ring-1 ring-blue-200/50';
                    badgeEstilos = 'bg-blue-500 text-white font-bold animate-pulse';
                    textoEstado = 'INGRESO';
                    shadowGlow = 'shadow-md shadow-blue-500/5';
                } else if (estado === 'llena') {
                    cardEstilos = 'bg-emerald-50/60 border-emerald-600 text-emerald-900 font-medium';
                    badgeEstilos = 'bg-emerald-700 text-white font-semibold';
                    textoEstado = 'COMPLETA';
                } else if (estado === 'vaciando') {
                    cardEstilos = 'bg-amber-50 border-amber-400 text-amber-900 ring-1 ring-amber-200/50';
                    badgeEstilos = 'bg-amber-500 text-slate-900 font-black animate-pulse';
                    textoEstado = 'INTERPLANTAS';
                    shadowGlow = 'shadow-md shadow-amber-500/5';
                } else if (estado === 'vacía') {
                    cardEstilos = 'bg-white border-dashed border-slate-200 text-slate-300';
                    badgeEstilos = 'bg-slate-50 text-slate-400 border border-slate-100';
                    textoEstado = 'VACÍA';
                }

                contenedor.innerHTML += `
                    <div class="camara-node pos-${index} ${shadowGlow} w-[76px] h-[76px] sm:w-[94px] sm:h-[94px] border rounded-2xl flex flex-col items-center justify-center p-1.5 text-center select-none ${cardEstilos}">
                        <span class="text-[8px] sm:text-[9px] uppercase tracking-widest opacity-50 font-bold">Cámara</span>
                        <span class="text-xl sm:text-2xl font-black tracking-tight my-0.5">${num}</span>
                        <span class="text-[7px] sm:text-[8px] px-1.5 py-0.5 rounded font-extrabold tracking-wide ${badgeEstilos}">${textoEstado}</span>
                    </div>
                `;
            });

            actualizarMetricas(datosActuales);
        }

        function actualizarMetricas(datos) {
            document.getElementById('kpi-ocupacion').innerText = datos.ocupacion;
            document.getElementById('kpi-libres').innerText = datos.libres;
            document.getElementById('kpi-contador-despachos').innerText = datos.ciclo;
            document.getElementById('contador-dias').innerText = datos.paso;

            const contenedorDatos = document.getElementById('datos-operacion');
            contenedorDatos.innerHTML = `
                <div>
                    <span class="text-[10px] md:text-xs font-bold text-slate-400 block uppercase tracking-wider">Flujo de Ingreso:</span>
                    <span class="text-xs md:text-sm font-bold text-slate-800 flex items-center gap-1">🚚 ${datos.ingreso}</span>
                </div>
                <div>
                    <span class="text-[10px] md:text-xs font-bold text-slate-400 block uppercase tracking-wider">Tránsito Interplantas:</span>
                    <span class="text-xs md:text-sm font-bold text-slate-800 flex items-center gap-1">🔄 ${datos.despacho}</span>
                </div>
            `;
        }

        function avanzarDia() {
            const cronograma = getCronograma();
            if (diaActual < cronograma.length - 1) {
                diaActual++;
            } else {
                diaActual = 0; 
            }
            renderizarReloj();
        }

        function retrocederDia() {
            if (diaActual > 0) {
                diaActual--;
                renderizarReloj();
            }
        }

        function reiniciarSimulacion() {
            diaActual = 0;
            renderizarReloj();
        }

        renderizarReloj();
    </script>
</body>
</html>

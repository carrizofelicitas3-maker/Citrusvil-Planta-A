<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citrusvil | Planta A</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .clock-container {
            position: relative;
            width: 290px;
            height: 290px;
            border-radius: 50%;
        }
        @media (min-width: 640px) {
            .clock-container {
                width: 360px;
                height: 360px;
            }
        }
        .camara-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Posiciones en sentido HORARIO (Cámaras 6 a 11) */
        .pos-0 { top: 12%; left: 50%; }   /* Cámara 6 */
        .pos-1 { top: 31%; left: 83%; }   /* Cámara 7 */
        .pos-2 { top: 69%; left: 83%; }   /* Cámara 8 */
        .pos-3 { top: 88%; left: 50%; }   /* Cámara 9 */
        .pos-4 { top: 69%; left: 17%; }   /* Cámara 10 */
        .pos-5 { top: 31%; left: 17%; }   /* Cámara 11 */

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }
        .animate-spin-reverse {
            animation: spin-reverse 20s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <header class="border-b border-slate-200 pb-5 mb-6">
            <div class="flex items-center gap-2">
                <span class="bg-emerald-700 text-white text-[10px] font-black px-2.5 py-0.5 rounded tracking-wider">CITRUSVIL</span>
                <span class="text-slate-400 text-xs font-bold tracking-wider">PLANTA A</span>
            </div>
            <h1 class="text-xl md:text-2xl font-black text-slate-900 mt-1 tracking-tight">
                Análisis predictivo de ocupación de cámaras de frío 6 a 11
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-center">
            
            <div class="lg:col-span-7 space-y-5">
                
                <div class="grid grid-cols-3 gap-3 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div class="text-center border-r border-slate-100">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Ocupación Planta</span>
                        <span id="kpi-ocupacion" class="text-lg md:text-2xl font-black text-indigo-600">0%</span>
                    </div>
                    <div class="text-center border-r border-slate-100">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Cámaras Disponibles</span>
                        <span id="kpi-libres" class="text-lg md:text-2xl font-black text-slate-700">0</span>
                    </div>
                    <div class="text-center px-1">
                        <span class="text-[9px] text-slate-400 block font-bold tracking-wider uppercase">Días con Interplanta</span>
                        <span id="kpi-contador-despachos" class="text-lg md:text-2xl font-black text-emerald-600">0</span>
                    </div>
                </div>

                <div class="bg-white border border-slate-200 rounded-2xl p-4 md:p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-indigo-600"></span>
                            Simulación de Capacidad Mensual Sincronizada
                        </h2>
                        <span id="contador-dias" class="text-xs font-bold bg-slate-100 text-slate-700 px-2.5 py-0.5 rounded-full border border-slate-200">Día 1</span>
                    </div>

                    <div class="grid grid-cols-12 gap-2 mb-4">
                        <button onclick="retrocederDia()" class="col-span-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-2 rounded-xl transition flex items-center justify-center gap-1 cursor-pointer text-xs tracking-wide border border-slate-200/60">
                            <span>◀</span> Volver
                        </button>
                        <button id="btn-siguiente" onclick="avanzarDia()" class="col-span-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md shadow-indigo-600/10 flex items-center justify-center gap-2 cursor-pointer text-xs md:text-sm tracking-wide">
                            Avanzar Día <span>▶</span>
                        </button>
                        <button onclick="reiniciarSimulacion()" class="col-span-3 bg-slate-50 hover:bg-slate-100 text-slate-500 font-medium py-3 px-2 rounded-xl transition cursor-pointer text-xs border border-slate-200/40">
                            Reiniciar
                        </button>
                    </div>

                    <div class="p-4 bg-slate-50 rounded-xl border border-slate-200/60 relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-indigo-600"></div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs md:text-sm" id="datos-operacion">
                            </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col items-center bg-white border border-slate-200 p-4 md:p-6 rounded-2xl shadow-sm">
                
                <div class="clock-container my-4 bg-slate-50 border border-slate-100 flex items-center justify-center shadow-inner">
                    
                    <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-full bg-white border border-slate-200 flex flex-col items-center justify-center text-center p-2 z-10 shadow-sm">
                        <span class="text-[8px] sm:text-[9px] text-slate-400 font-bold tracking-widest">INGRESO</span>
                        <span class="text-[10px] sm:text-xs font-black text-indigo-600 tracking-wider">ANTIHORARIO</span>
                        <svg class="w-4 h-4 sm:w-5 sm:h-5 text-indigo-500 mt-1 animate-spin-reverse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17" />
                        </svg>
                    </div>
                    
                    <div id="reloj-camaras" class="absolute inset-0 w-full h-full"></div>
                </div>

                <div class="w-full grid grid-cols-2 gap-2 mt-2 pt-4 border-t border-slate-100 text-[10px] md:text-[11px] font-semibold text-slate-500">
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-white border border-slate-300 rounded"></div>
                        <span>Disponible (Vacía)</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-blue-500 animate-pulse rounded"></div>
                        <span>Ingreso (Llenado)</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-emerald-600 rounded"></div>
                        <span>Completa</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200/60">
                        <div class="w-2.5 h-2.5 bg-amber-500 animate-pulse rounded"></div>
                        <span>Interplantas (Despacho)</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const camarasConfig = [6, 7, 8, 9, 10, 11];
        let diaActual = 0;

        /* CRONOGRAMA REAL SEXTUPLICADO: Flujo simultáneo continuo (Ingreso e Interplantas en paralelo todos los días) */
        const cronogramaDias = [
            { dia: "Día 1", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Primer día)", despacho: "Cámara 11 (Primer día)", diasInterplanta: 1, balance: "Arranque de régimen permanente. Ingreso e interplantas activos en paralelo." },
            { dia: "Día 2", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Segundo día)", despacho: "Cámara 11 (Segundo día)", diasInterplanta: 2, balance: "Finalización de ciclos sobre Cámara 6 y Cámara 11." },
            
            { dia: "Día 3", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Primer día)", despacho: "Cámara 10 (Primer día)", diasInterplanta: 3, balance: "Rotación antihoraria. Cámara 6 se completa e inicia llenado de Cámara 11." },
            { dia: "Día 4", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Segundo día)", despacho: "Cámara 10 (Segundo día)", diasInterplanta: 4, balance: "Cámara 10 se vacía por completo para el próximo ciclo." },
            
            { dia: "Día 5", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Primer día)", despacho: "Cámara 9 (Primer día)", diasInterplanta: 5, balance: "Tracción secuencial FIFO aplicada sobre el stock guardado en Cámara 9." },
            { dia: "Día 6", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Segundo día)", despacho: "Cámara 9 (Segundo día)", diasInterplanta: 6, balance: "Corte de balance de masa equilibrado. Planta al ochenta y tres por ciento de ocupación." },
            
            { dia: "Día 7", estados: ['llena', 'llena', 'vaciando', 'llenando', 'llena', 'llena'], ingreso: "Cámara 9 (Primer día)", despacho: "Cámara 8 (Primer día)", diasInterplanta: 7, balance: "El ingreso pasa a Cámara 9 mientras se libera Cámara 8 hacia producción." },
            { dia: "Día 8", estados: ['llena', 'llena', 'vaciando', 'llenando', 'llena', 'llena'], ingreso: "Cámara 9 (Segundo día)", despacho: "Cámara 8 (Segundo día)", diasInterplanta: 8, balance: "Estabilidad absoluta del flujo de fruta sin generar cuellos de botella." },
            
            { dia: "Día 9", estados: ['llena', 'vaciando', 'llenando', 'llena', 'llena', 'llena'], ingreso: "Cámara 8 (Primer día)", despacho: "Cámara 7 (Primer día)", diasInterplanta: 9, balance: "Liberación de Cámara 7 por despacho interplanta en paralelo al ingreso de Cámara 8." },
            { dia: "Día 10", estados: ['llena', 'vaciando', 'llenando', 'llena', 'llena', 'llena'], ingreso: "Cámara 8 (Segundo día)", despacho: "Cámara 7 (Segundo día)", diasInterplanta: 10, balance: "La rotación matemática mantiene la planta en régimen ordenado." },
            
            { dia: "Día 11", estados: ['vaciando', 'llenando', 'llena', 'llena', 'llena', 'llena'], ingreso: "Cámara 7 (Primer día)", despacho: "Cámara 6 (Primer día)", diasInterplanta: 11, balance: "Cierre de la primera vuelta completa del anillo. Movimiento coordinado de stock." },
            { dia: "Día 12", estados: ['vaciando', 'llenando', 'llena', 'llena', 'llena', 'llena'], ingreso: "Cámara 7 (Segundo día)", despacho: "Cámara 6 (Segundo día)", diasInterplanta: 12, balance: "Cámara 6 queda limpia para reiniciar la secuencia de ingreso." },
            
            { dia: "Día 13", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Primer día)", despacho: "Cámara 11 (Primer día)", diasInterplanta: 13, balance: "Repetición exacta del patrón operativo del primer día." },
            { dia: "Día 14", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Segundo día)", despacho: "Cámara 11 (Segundo día)", diasInterplanta: 14, balance: "Flujo interplanta continuo sin paradas operativas en el sector de frío." },
            
            { dia: "Día 15", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Primer día)", despacho: "Cámara 10 (Primer día)", diasInterplanta: 15, balance: "Despacho automatizado de Cámara 10 e ingreso controlado en Cámara 11." },
            { dia: "Día 16", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Segundo día)", despacho: "Cámara 10 (Segundo día)", diasInterplanta: 16, balance: "Ventana de cuarenta y ocho horas cumplida de forma rigurosa." },
            
            { dia: "Día 17", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Primer día)", despacho: "Cámara 9 (Primer día)", diasInterplanta: 17, balance: "Sincronización de ritmo logístico entre cámaras del sector norte y sur." },
            { dia: "Día 18", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Segundo día)", despacho: "Cámara 9 (Segundo día)", diasInterplanta: 18, balance: "Garantía de rotación limpia bajo el principio de primero en entrar, primero en salir." },
            
            { dia: "Día 19", estados: ['llena', 'llena', 'vaciando', 'llenando', 'llena', 'llena'], ingreso: "Cámara 9 (Primer día)", despacho: "Cámara 8 (Primer día)", diasInterplanta: 19, balance: "Cámara 9 recibe fruta fresca de la línea de empaque en tiempo real." },
            { dia: "Día 20", estados: ['llena', 'llena', 'vaciando', 'llenando', 'llena', 'llena'], ingreso: "Cámara 9 (Segundo día)", despacho: "Cámara 8 (Segundo día)", diasInterplanta: 20, balance: "Cumplimiento del tercio de la planificación operativa del mes." },
            
            { dia: "Día 21", estados: ['llena', 'vaciando', 'llenando', 'llena', 'llena', 'llena'], ingreso: "Cámara 8 (Primer día)", despacho: "Cámara 7 (Primer día)", diasInterplanta: 21, balance: "Operación paralela de alta densidad. Una sola posición libre transitoria." },
            { dia: "Día 22", estados: ['llena', 'vaciando', 'llenando', 'llena', 'llena', 'llena'], ingreso: "Cámara 8 (Segundo día)", despacho: "Cámara 7 (Segundo día)", diasInterplanta: 22, balance: "Despacho interplanta estabilizado en Cámara 7." },
            
            { dia: "Día 23", estados: ['vaciando', 'llenando', 'llena', 'llena', 'llena', 'llena'], ingreso: "Cámara 7 (Primer día)", despacho: "Cámara 6 (Primer día)", diasInterplanta: 23, balance: "El flujo pasa a la última fase del segundo ciclo completo." },
            { dia: "Día 24", estados: ['vaciando', 'llenando', 'llena', 'llena', 'llena', 'llena'], ingreso: "Cámara 7 (Segundo día)", despacho: "Cámara 6 (Segundo día)", diasInterplanta: 24, balance: "Estructura analítica sin desviaciones de stock retenido." },
            
            { dia: "Día 25", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Primer día)", despacho: "Cámara 11 (Primer día)", diasInterplanta: 25, balance: "Inicio de la última etapa de control de la simulación mensual." },
            { dia: "Día 26", estados: ['llenando', 'llena', 'llena', 'llena', 'llena', 'vaciando'], ingreso: "Cámara 6 (Segundo día)", despacho: "Cámara 11 (Segundo día)", diasInterplanta: 26, balance: "Consolidación de datos de rendimiento de frío." },
            
            { dia: "Día 27", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Primer día)", despacho: "Cámara 10 (Primer día)", diasInterplanta: 27, balance: "Coordinación milimétrica en el traspaso de líneas operativas." },
            { dia: "Día 28", estados: ['llena', 'llena', 'llena', 'llena', 'vaciando', 'llenando'], ingreso: "Cámara 11 (Segundo día)", despacho: "Cámara 10 (Segundo día)", diasInterplanta: 28, balance: "Despacho interplanta activo para cumplir los objetivos de la jornada." },
            
            { dia: "Día 29", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Primer día)", despacho: "Cámara 9 (Primer día)", diasInterplanta: 29, balance: "Fase final de control de stock en las posiciones centrales." },
            { dia: "Día 30", estados: ['llena', 'llena', 'llena', 'vaciando', 'llenando', 'llena'], ingreso: "Cámara 10 (Segundo día)", despacho: "Cámara 9 (Segundo día)", diasInterplanta: 30, balance: "Cierre de ciclo completo de treinta días operados bajo régimen extremo." }
        ];

        function renderizarReloj() {
            const contenedor = document.getElementById('reloj-camaras');
            contenedor.innerHTML = '';

            const datosActuales = cronogramaDias[diaActual];
            const estados = datosActuales.estados;

            camarasConfig.forEach((num, index) => {
                const estado = estados[index];
                
                let cardEstilos = 'bg-white border-slate-200 text-slate-400';
                let badgeEstilos = 'bg-slate-100 text-slate-400';
                let textoEstado = 'DISPONIBLE';
                let shadowGlow = 'shadow-sm';

                if (estado === 'llenando') {
                    cardEstilos = 'bg-blue-50 border-blue-400 text-blue-900 ring-1 ring-blue-200/50';
                    badgeEstilos = 'bg-blue-500 text-white font-bold animate-pulse';
                    textoEstado = 'INGRESO';
                    shadowGlow = 'shadow-md shadow-blue-500/5';
                } else if (estado === 'llena') {
                    cardEstilos = 'bg-emerald-50/60 border-emerald-600 text-emerald-900 font-medium';
                    badgeEstilos = 'bg-emerald-700 text-white font-semibold';
                    textoEstado = 'COMPLETA';
                } else if (estado === 'vaciando') {
                    cardEstilos = 'bg-amber-50 border-amber-400 text-amber-900 ring-1 ring-amber-200/50';
                    badgeEstilos = 'bg-amber-500 text-slate-900 font-black animate-pulse';
                    textoEstado = 'INTERPLANTAS';
                    shadowGlow = 'shadow-md shadow-amber-500/5';
                }

                contenedor.innerHTML += `
                    <div class="camara-node pos-${index} ${shadowGlow} w-[76px] h-[76px] sm:w-[94px] sm:h-[94px] border rounded-2xl flex flex-col items-center justify-center p-1.5 text-center select-none ${cardEstilos}">
                        <span class="text-[8px] sm:text-[9px] uppercase tracking-widest opacity-50 font-bold">Cámara</span>
                        <span class="text-xl sm:text-2xl font-black tracking-tight my-0.5">${num}</span>
                        <span class="text-[7px] sm:text-[8px] px-1.5 py-0.5 rounded font-extrabold tracking-wide ${badgeEstilos}">${textoEstado}</span>
                    </div>
                `;
            });

            actualizarMetricas(datosActuales);
        }

        function actualizarMetricas(datos) {
            const estados = datos.estados;
            const llenas = estados.filter(e => e === 'llena').length;
            const enProceso = estados.filter(e => e === 'llenando' || e === 'vaciando').length;
            const vacias = estados.filter(e => e === 'vacía').length;

            const porcentaje = Math.round(((llenas + (enProceso * 0.5)) / 6) * 100);
            
            document.getElementById('kpi-ocupacion').innerText = `${porcentaje}%`;
            // En régimen permanente extremo de 5 ocupadas y 1 libre, cuando una cámara está "vaciando" actúa como la libre en transición.
            document.getElementById('kpi-libres').innerText = vacias === 0 ? 1 : vacias;
            document.getElementById('kpi-contador-despachos').innerText = datos.diasInterplanta;

            document.getElementById('contador-dias').innerText = datos.dia;

            const contenedorDatos = document.getElementById('datos-operacion');
            contenedorDatos.innerHTML = `
                <div>
                    <span class="text-[10px] md:text-xs font-bold text-slate-400 block uppercase tracking-wider">Flujo de Ingreso (Antihorario):</span>
                    <span class="text-xs md:text-sm font-bold text-slate-800">${datos.ingreso}</span>
                </div>
                <div>
                    <span class="text-[10px] md:text-xs font-bold text-slate-400 block uppercase tracking-wider">Tránsito Interplantas (FIFO):</span>
                    <span class="text-xs md:text-sm font-bold text-slate-800">${datos.despacho}</span>
                </div>
                <div class="col-span-1 sm:col-span-2 pt-2 border-t border-slate-200 mt-1">
                    <span class="text-[10px] md:text-xs font-bold text-slate-400 block uppercase tracking-wider">Estado de Ocupación Dinámica:</span>
                    <span class="text-xs md:text-sm font-medium text-slate-600">${datos.balance}</span>
                </div>
            `;
        }

        function avanzarDia() {
            if (diaActual < cronogramaDias.length - 1) {
                diaActual++;
            } else {
                diaActual = 0; 
            }
            renderizarReloj();
        }

        function retrocederDia() {
            if (diaActual > 0) {
                diaActual--;
                renderizarReloj();
            }
        }

        function reiniciarSimulacion() {
            diaActual = 0;
            renderizarReloj();
        }

        renderizarReloj();
    </script>
</body>
</html>
